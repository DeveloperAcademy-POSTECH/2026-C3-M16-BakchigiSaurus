name: Xcode Build and Test

on:
  push:
    paths:
      - "project/**"
      - ".github/workflows/xcode-project.yml"
  pull_request:
    paths:
      - "project/**"
      - ".github/workflows/xcode-project.yml"
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: macos-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: project
    env:
      PROJECT_PATH: hideandseek.xcodeproj
      SCHEME: hideandseek

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Detect test targets
        id: detect_tests
        run: |
          if grep -Eq 'com\.apple\.product-type\.bundle\.(unit-test|ui-testing)' "$PROJECT_PATH/project.pbxproj"; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build app for iOS Simulator
        run: |
          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Select simulator destination
        if: steps.detect_tests.outputs.has_tests == 'true'
        id: simulator
        run: |
          destination="$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ { print "platform=iOS Simulator,id=" $2; exit }')"

          if [ -z "$destination" ]; then
            echo "No available iPhone simulator found." >&2
            exit 1
          fi

          echo "destination=$destination" >> "$GITHUB_OUTPUT"

      - name: Run tests
        if: steps.detect_tests.outputs.has_tests == 'true'
        run: |
          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -destination "${{ steps.simulator.outputs.destination }}" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            test

      - name: Skip tests
        if: steps.detect_tests.outputs.has_tests != 'true'
        run: echo "No unit/UI test target found. Build completed without running tests."
